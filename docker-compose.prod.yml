services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-helm}
      POSTGRES_USER:     ${POSTGRES_USER:-helm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helm} -d ${POSTGRES_DB:-helm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application ───────────────────────────────────────────────────────────────

  backend:
    image: ghcr.io/jerry-scintilla/helm-backend:${HELM_VERSION:-latest}
    env_file: .env
    volumes:
      - plugins_data:/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    image: ghcr.io/jerry-scintilla/helm-backend:${HELM_VERSION:-latest}
    command: >
      celery -A app.tasks.celery_app worker
      --queues=default,characters,corporations,bucket,high
      --concurrency=${CELERY_CONCURRENCY:-4}
      --loglevel=info
    env_file: .env
    volumes:
      - plugins_data:/app/plugins
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/jerry-scintilla/helm-backend:${HELM_VERSION:-latest}
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - plugins_data:/app/plugins
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend + Reverse Proxy ──────────────────────────────────────────────────

  nginx:
    image: ghcr.io/jerry-scintilla/helm-frontend:${HELM_VERSION:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  plugins_data:
