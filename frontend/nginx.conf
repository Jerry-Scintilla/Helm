server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # Versioned build assets — immutable cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Shared proxy settings (used in multiple blocks below)
    # proxy_params are inlined per block because nginx doesn't support includes here

    # EVE SSO callback — handled by Vue Router, not the backend
    location = /auth/callback {
        try_files $uri /index.html;
    }

    # All REST API routes — /api/v1/... (includes auth)
    location /api/v1/ {
        proxy_pass              http://backend:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_set_header        Connection '';
        chunked_transfer_encoding on;
    }

    # FastAPI-served static files
    location /plugin-sdk/ {
        proxy_pass              http://backend:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    location /plugin-ui/ {
        proxy_pass              http://backend:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_set_header        Connection '';
        chunked_transfer_encoding on;
    }

    # Health check
    location = /health {
        proxy_pass              http://backend:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
    }

    # Vue SPA — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
